<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMEMAY</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Orbitron:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw; height: 100vh;
    overflow: hidden; background: #0a0a12;
    display: flex; align-items: center; justify-content: center;
    cursor: default; user-select: none;
  }
  #bgCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
  #mmCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 30; pointer-events: none; display: none; }

  .noise {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
    opacity: 0.03; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }
  .flash-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 25; opacity: 0; background: white;
  }
  .stage {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; align-items: center; gap: 60px;
  }
  .logo-wrap {
    position: relative; min-width: 500px; min-height: 120px;
    display: flex; align-items: center; justify-content: center;
  }
  #logo {
    font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 96px;
    letter-spacing: 14px; color: #fff;
    text-shadow: 0 0 40px rgba(255,255,255,0.3);
    white-space: nowrap; position: relative;
  }
  #logo .char { display: inline-block; transition: color 0.1s; }

  .glow-ring {
    position: absolute; width: 200px; height: 200px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.08);
    box-shadow: 0 0 60px rgba(255,255,255,0.05), inset 0 0 60px rgba(255,255,255,0.03);
    opacity: 0; transition: all 1s ease;
  }
  .glow-ring.show { opacity: 1; width: 340px; height: 340px; }
  .glow-ring.ememay {
    border-color: rgba(170,0,255,0.15);
    box-shadow: 0 0 80px rgba(170,0,255,0.1), 0 0 120px rgba(255,0,100,0.05), inset 0 0 60px rgba(170,0,255,0.05);
    width: 400px; height: 400px;
  }
  .glow-ring.explode { opacity: 0; width: 800px; height: 800px; border-color: transparent; transition: all 0.5s ease-out; }

  .loader-area { display: flex; flex-direction: column; align-items: center; gap: 14px; width: 320px; }
  .loader-track {
    width: 100%; height: 6px; background: rgba(255,255,255,0.06);
    border-radius: 3px; overflow: hidden; opacity: 0; transform: translateY(10px);
    transition: opacity 0.5s, transform 0.5s;
  }
  .loader-track.show { opacity: 1; transform: translateY(0); }
  .loader-fill {
    height: 100%; width: 0%; border-radius: 3px;
    background: rgba(255,255,255,0.4); box-shadow: 0 0 10px rgba(255,255,255,0.2);
    transition: width 0.3s ease-out, background 1s ease;
  }
  .status {
    font-family: 'VT323', monospace; font-size: 16px;
    color: rgba(255,255,255,0.25); letter-spacing: 1.5px; height: 20px;
    opacity: 0; transform: translateY(6px); transition: opacity 0.4s, transform 0.4s;
  }
  .status.show { opacity: 1; transform: translateY(0); }

  .ver {
    position: fixed; bottom: 14px; right: 18px;
    font-family: 'VT323', monospace; font-size: 13px;
    color: rgba(255,255,255,0.1); z-index: 10; letter-spacing: 1px;
  }
  .replay {
    position: fixed; bottom: 14px; left: 18px;
    font-family: 'VT323', monospace; font-size: 15px;
    color: rgba(255,255,255,0.15); background: none;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 4px 14px; border-radius: 3px;
    cursor: pointer; z-index: 40; opacity: 0; pointer-events: none;
    transition: color 0.2s, border-color 0.2s, opacity 0.5s;
  }
  .replay:hover { color: rgba(255,255,255,0.5); border-color: rgba(255,255,255,0.3); }
  .replay.show { opacity: 1; pointer-events: auto; }

  @keyframes ememayGrad {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<canvas id="mmCanvas"></canvas>
<div class="noise"></div>
<div class="flash-overlay" id="flash"></div>

<div class="stage">
  <div class="logo-wrap">
    <div class="glow-ring" id="glowRing"></div>
    <div id="logo"></div>
  </div>
  <div class="loader-area">
    <div class="loader-track" id="track">
      <div class="loader-fill" id="fill"></div>
    </div>
    <div class="status" id="status"></div>
  </div>
</div>

<div class="ver">v4.2.0</div>
<button class="replay" id="replay" onclick="location.reload()">↻ REPLAY</button>

<script>
const $ = id => document.getElementById(id);
const wait = ms => new Promise(r => setTimeout(r, ms));
const rand = (a, b) => Math.random() * (b - a) + a;

/* ═══════════ LOADING MESSAGES ═══════════ */
const msgs = [
  "Reticulating splines...",
  "Charging flux capacitor...",
  "Convincing pixels to behave...",
  "Teaching electrons new tricks...",
  "Downloading more colors...",
  "Negotiating with the cloud...",
  "Warming up the hamster wheel...",
  "Compiling good vibes...",
  "Generating enthusiasm...",
  "Aligning chakras...",
  "Bribing the render engine...",
  "Polishing every pixel by hand...",
  "Loading loading screen...",
  "Counting backwards from infinity...",
  "Untangling spaghetti code...",
  "Calibrating vibes...",
  "Translating binary feelings...",
  "Making electrons go brrr...",
  "Converting caffeine to code...",
  "Almost there... probably...",
  "Summoning the CSS gods...",
  "Inflating the cloud...",
  "Optimizing procrastination engine...",
  "Feeding the code monkeys...",
  "Applying finishing touches...",
  "✦ Ready when you are ✦",
];
let mi = 0;
function nextMsg() { $('status').textContent = msgs[mi++ % msgs.length]; }
function setBar(p) { $('fill').style.width = p + '%'; }

/* ═══════════ COLORFUL BLOB BACKGROUND ═══════════ */
const bgC = $('bgCanvas'), bgX = bgC.getContext('2d');
function rBg() {
  const d = devicePixelRatio;
  bgC.width = innerWidth * d; bgC.height = innerHeight * d;
  bgC.style.width = innerWidth + 'px'; bgC.style.height = innerHeight + 'px';
}
rBg(); window.addEventListener('resize', rBg);

const blobs = [
  { x:.25, y:.35, sx:.7,  sy:.5,  r:.32, c:[255,40,100] },
  { x:.75, y:.25, sx:.4,  sy:.8,  r:.28, c:[40,80,255] },
  { x:.5,  y:.7,  sx:.6,  sy:.3,  r:.30, c:[80,220,120] },
  { x:.15, y:.65, sx:.8,  sy:.6,  r:.24, c:[255,180,0] },
  { x:.85, y:.6,  sx:.5,  sy:.7,  r:.26, c:[200,40,255] },
  { x:.5,  y:.15, sx:.3,  sy:.4,  r:.25, c:[0,200,255] },
  { x:.35, y:.5,  sx:.9,  sy:.2,  r:.20, c:[255,100,200] },
];
let bT = 0, bBr = 0.4;

function drawBg() {
  const W = bgC.width, H = bgC.height;
  bgX.fillStyle = '#08080f';
  bgX.fillRect(0, 0, W, H);
  bgX.globalCompositeOperation = 'screen';
  for (const b of blobs) {
    const cx = (b.x + Math.sin(bT * b.sx + b.sy * 10) * 0.18) * W;
    const cy = (b.y + Math.cos(bT * b.sy + b.sx * 10) * 0.14) * H;
    const r = b.r * Math.min(W, H);
    const g = bgX.createRadialGradient(cx, cy, 0, cx, cy, r);
    const [cr, cg, cb] = b.c;
    g.addColorStop(0, `rgba(${cr},${cg},${cb},${bBr * 0.7})`);
    g.addColorStop(0.4, `rgba(${cr},${cg},${cb},${bBr * 0.3})`);
    g.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
    bgX.fillStyle = g;
    bgX.beginPath(); bgX.arc(cx, cy, r, 0, Math.PI * 2); bgX.fill();
  }
  bgX.globalCompositeOperation = 'source-over';
  bT += 0.003;
}
(function bgLoop() { drawBg(); requestAnimationFrame(bgLoop); })();

/* ═══════════ TEXT SCRAMBLE ═══════════ */
const SCHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%&*<>░▒▓█';

function setLogo(text) {
  const l = $('logo'); l.innerHTML = '';
  for (const c of text) {
    const s = document.createElement('span');
    s.className = 'char'; s.textContent = c; l.appendChild(s);
  }
}

function scrambleTo(target, dur = 1200) {
  return new Promise(res => {
    const l = $('logo');
    const cur = l.textContent;
    const max = Math.max(cur.length, target.length);
    l.innerHTML = '';
    for (let i = 0; i < max; i++) {
      const s = document.createElement('span');
      s.className = 'char'; s.textContent = cur[i] || ' '; l.appendChild(s);
    }
    const spans = l.querySelectorAll('.char');
    const locks = [];
    for (let i = 0; i < max; i++)
      locks.push(dur * 0.25 + (i / max) * dur * 0.6 + Math.random() * dur * 0.2);

    const t0 = performance.now();
    function tick(now) {
      const el = now - t0;
      let done = true;
      for (let i = 0; i < max; i++) {
        if (el >= locks[i]) {
          spans[i].textContent = i < target.length ? target[i] : '';
          spans[i].style.color = ''; spans[i].style.opacity = i < target.length ? '1' : '0';
        } else {
          done = false;
          spans[i].textContent = SCHARS[Math.floor(Math.random() * SCHARS.length)];
          spans[i].style.color = `hsl(${Math.random()*360},80%,70%)`;
          spans[i].style.opacity = '0.7';
        }
      }
      if (done) {
        while (l.children.length > target.length) l.removeChild(l.lastChild);
        res();
      } else requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  });
}

/* ═══════════ FLASH ═══════════ */
function flash(col = '#fff', int = 0.6, dur = 300) {
  const e = $('flash');
  e.style.background = col; e.style.transition = 'none'; e.style.opacity = int;
  requestAnimationFrame(() => { e.style.transition = `opacity ${dur}ms ease-out`; e.style.opacity = 0; });
}

/* ═══════════ M&M PHYSICS ═══════════ */
const mmC = $('mmCanvas'), mmX = mmC.getContext('2d');
function rMm() {
  const d = devicePixelRatio;
  mmC.width = innerWidth * d; mmC.height = innerHeight * d;
  mmC.style.width = innerWidth + 'px'; mmC.style.height = innerHeight + 'px';
}
rMm(); window.addEventListener('resize', rMm);

const MMCOL = ['#e81224','#0078d4','#fff100','#00a651','#f7630c','#6b3a2a','#b4009e'];

class MnM {
  constructor(x, y, vx, vy, r) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.r = r;
    this.col = MMCOL[Math.floor(Math.random() * MMCOL.length)];
    this.rot = Math.random() * Math.PI * 2;
    this.rs = rand(-0.08, 0.08);
  }
  update(W, H) {
    this.vy += 0.5;
    this.vx *= 0.998;
    this.x += this.vx; this.y += this.vy;
    this.rot += this.rs;
    if (this.y + this.r > H) { this.y = H - this.r; this.vy *= -0.6; this.vx *= 0.95; this.rs *= 0.9; }
    if (this.x - this.r < 0) { this.x = this.r; this.vx *= -0.6; }
    if (this.x + this.r > W) { this.x = W - this.r; this.vx *= -0.6; }
    if (this.y - this.r < 0) { this.y = this.r; this.vy *= -0.6; }
  }
  draw(c) {
    c.save(); c.translate(this.x, this.y); c.rotate(this.rot);
    // shadow
    c.beginPath(); c.ellipse(3, 3, this.r, this.r * 0.82, 0, 0, Math.PI * 2);
    c.fillStyle = 'rgba(0,0,0,0.18)'; c.fill();
    // body
    c.beginPath(); c.ellipse(0, 0, this.r, this.r * 0.82, 0, 0, Math.PI * 2);
    c.fillStyle = this.col; c.fill();
    // shine
    c.beginPath(); c.ellipse(-this.r * 0.22, -this.r * 0.22, this.r * 0.32, this.r * 0.22, -0.4, 0, Math.PI * 2);
    c.fillStyle = 'rgba(255,255,255,0.35)'; c.fill();
    // m
    c.fillStyle = 'rgba(255,255,255,0.92)';
    c.font = `bold ${this.r * 0.8}px sans-serif`;
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText('m', 0, 1);
    c.restore();
  }
}

let mnms = [], mmOn = false;

function spawnBoom(cx, cy, n) {
  const d = devicePixelRatio;
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2 + rand(-0.3, 0.3);
    const spd = rand(10, 30) * d;
    mnms.push(new MnM(cx * d, cy * d, Math.cos(a) * spd, Math.sin(a) * spd - rand(6, 16) * d, rand(14, 28) * d));
  }
}
function spawnRain(n) {
  const d = devicePixelRatio, W = mmC.width;
  for (let i = 0; i < n; i++) {
    setTimeout(() => {
      const r = rand(12, 24) * d;
      mnms.push(new MnM(rand(r, W - r), -r * 2, rand(-4, 4) * d, rand(2, 8) * d, r));
    }, i * 35);
  }
}
function mmLoop() {
  if (!mmOn) return;
  const W = mmC.width, H = mmC.height;
  mmX.clearRect(0, 0, W, H);
  for (const m of mnms) { m.update(W, H); m.draw(mmX); }
  requestAnimationFrame(mmLoop);
}

/* ═══════════ MAIN SEQUENCE ═══════════ */
async function run() {
  const logo = $('logo'), ring = $('glowRing');

  await wait(300);
  $('track').classList.add('show');
  $('status').classList.add('show');
  nextMsg();

  /* ——— HMI ——— */
  await wait(500);
  setLogo('HMI');
  logo.style.opacity = '0'; logo.style.transform = 'scale(0.5) translateY(20px)';
  logo.style.filter = 'blur(12px)';
  logo.style.transition = 'all 0.8s cubic-bezier(0.22,1,0.36,1)';
  await wait(50);
  logo.style.opacity = '1'; logo.style.transform = 'scale(1)'; logo.style.filter = 'blur(0)';
  ring.classList.add('show');
  setBar(8); await wait(800);

  for (let p = 12; p <= 32; p += rand(3, 7)|0) {
    setBar(p); nextMsg(); await wait(rand(400, 700));
  }

  /* ——— HMI → MMI ——— */
  await wait(300);
  logo.style.textShadow = '0 0 60px rgba(255,100,50,0.5)';
  setStatus('⚠ Mutation detected...'); await wait(600);
  flash('#ff4400', 0.4, 250);
  await scrambleTo('MMI', 800);
  logo.style.textShadow = '0 0 50px rgba(0,255,100,0.4)';
  $('fill').style.background = 'rgba(0,220,100,0.5)';
  $('fill').style.boxShadow = '0 0 10px rgba(0,220,100,0.3)';
  flash('#00ff66', 0.3, 300);
  setBar(40); nextMsg(); await wait(500);
  bBr = 0.55;

  for (let p = 44; p <= 65; p += rand(3, 6)|0) {
    setBar(p); nextMsg(); await wait(rand(350, 600));
  }

  /* ——— MMI → EMEMAY ——— */
  await wait(400);
  setStatus('✦ Evolution in progress...');
  logo.style.textShadow = '0 0 80px rgba(170,0,255,0.5)'; await wait(500);
  flash('#aa00ff', 0.5, 400);
  await scrambleTo('EMEMAY', 1500);

  logo.style.background = 'linear-gradient(135deg,#ff6b00,#ff0066,#aa00ff,#00bbff,#00ff88)';
  logo.style.backgroundSize = '300% 300%';
  logo.style.webkitBackgroundClip = 'text';
  logo.style.webkitTextFillColor = 'transparent';
  logo.style.backgroundClip = 'text';
  logo.style.textShadow = 'none';
  logo.style.filter = 'drop-shadow(0 0 30px rgba(170,0,255,0.4)) drop-shadow(0 0 60px rgba(255,0,100,0.2))';
  logo.style.animation = 'ememayGrad 3s ease-in-out infinite';

  ring.classList.add('ememay');
  $('fill').style.background = 'linear-gradient(90deg,#ff6b00,#ff0066,#aa00ff,#00bbff)';
  $('fill').style.backgroundSize = '200% 100%';
  $('fill').style.boxShadow = '0 0 14px rgba(170,0,255,0.3)';
  flash('#ffffff', 0.5, 350);
  bBr = 0.65;
  setBar(72); nextMsg(); await wait(500);

  for (let p = 75; p <= 92; p += rand(3, 5)|0) {
    setBar(p); nextMsg(); await wait(rand(300, 500));
  }
  setBar(100); setStatus('✦ Ready when you are ✦'); await wait(800);

  /* ——— EMEMAY EXPLODES ——— */
  logo.style.transition = 'all 0.3s ease-in';
  logo.style.transform = 'scale(1.15)'; await wait(300);
  logo.style.transition = 'all 0.15s ease-in';
  logo.style.transform = 'scale(1.3)';
  logo.style.filter = 'brightness(2.5) drop-shadow(0 0 40px rgba(255,255,255,0.6))';
  await wait(150);

  flash('#ffffff', 0.9, 500);
  logo.style.transition = 'all 0.2s ease-out';
  logo.style.transform = 'scale(0)'; logo.style.opacity = '0';
  ring.classList.add('explode');
  $('track').style.transition = 'opacity 0.3s'; $('track').style.opacity = '0';
  $('status').style.transition = 'opacity 0.3s'; $('status').style.opacity = '0';

  mmC.style.display = 'block'; mmOn = true; mmLoop();
  spawnBoom(innerWidth / 2, innerHeight / 2, 70);
  await wait(400);
  spawnRain(50);
  bBr = 0.85;

  /* ——— EMEMAY reappears ——— */
  await wait(2800);
  const fin = document.createElement('div');
  fin.style.cssText = `
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);
    z-index:35;font-family:'Orbitron',sans-serif;font-weight:900;
    font-size:72px;letter-spacing:12px;
    background:linear-gradient(135deg,#ff6b00,#ff0066,#aa00ff,#00bbff,#00ff88);
    background-size:300% 300%;
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    filter:drop-shadow(0 0 30px rgba(170,0,255,0.5));
    opacity:0;transition:all 1.2s cubic-bezier(0.22,1,0.36,1);
    animation:ememayGrad 3s ease-in-out infinite;
  `;
  fin.textContent = 'EMEMAY';
  document.body.appendChild(fin);
  await wait(50);
  fin.style.opacity = '1'; fin.style.transform = 'translate(-50%,-50%) scale(1)';
  await wait(500);
  $('replay').classList.add('show');
}

run();
</script>
</body>
</html>
